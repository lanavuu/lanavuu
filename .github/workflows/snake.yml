name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: lanavuu
          outputs: dist/snake.svg

      - name: Upload snake artifact
        uses: actions/upload-artifact@v4
        with:
          name: snake
          path: dist/snake.svg
